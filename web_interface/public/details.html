<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Profile — CareerPulse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded flex items-center justify-center">
                <span class="text-white font-bold">C</span>
            </div>
            <a href="index.html" class="text-xl font-bold text-gray-900">CareerPulse</a>
        </div>

        <div class="hidden md:flex gap-6 text-sm font-medium">
            <a href="search.html" class="text-gray-500 hover:text-violet-600">Search</a>
            <a href="analyzer.html" class="text-gray-500 hover:text-violet-600">Analyzer</a>
            <a href="upload.html" class="text-gray-500 hover:text-violet-600">Upload</a>
            <a href="dashboard.html" class="text-gray-500 hover:text-violet-600">Dashboard</a>
        </div>

        <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center border border-gray-200">
            <span class="text-gray-600 text-[10px] font-bold">JD</span>
        </div>
    </nav>

    <main class="grow max-w-3xl mx-auto px-6 py-12 w-full">
        <header class="mb-10">
            <h1 class="text-3xl font-bold mb-2">Complete your profile</h1>
            <p class="text-gray-500">Help us personalize your insights. All data remains local.</p>
        </header>

        <div class="space-y-6">
            <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                <h2 class="text-sm font-bold text-violet-600 uppercase mb-4">Basic Information</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Full Name</label>
                        <input type="text" placeholder="John Doe" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-violet-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Email</label>
                        <input type="email" placeholder="john@example.com" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-violet-500 text-sm">
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                <h2 class="text-sm font-bold text-indigo-600 uppercase mb-4">Goals</h2>
                <div class="space-y-4">
                    <div class="flex flex-wrap gap-2">
                        <button class="px-4 py-2 rounded-full border border-gray-200 text-xs font-bold hover:border-violet-600">Student</button>
                        <button class="px-4 py-2 rounded-full bg-violet-600 text-white text-xs font-bold">Working Pro</button>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Target Role</label>
                        <input type="text" placeholder="AI Engineer" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-violet-500 text-sm">
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                <h2 class="text-sm font-bold text-teal-600 uppercase mb-4">Skills</h2>
                <input type="text" placeholder="Python, React, etc." class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-violet-500 text-sm">
            </section>

            <div class="pt-4 flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-[10px] text-gray-400 max-w-xs">Data is processed locally on your device.</p>
                <button class="w-full md:w-auto bg-gray-900 text-white font-bold px-8 py-3 rounded-full hover:bg-gray-800 transition-colors">Save & Continue</button>
            </div>
        </div>
    </main>

    <footer class="py-10 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 CareerPulse.
    </footer>

</body>

</html>
