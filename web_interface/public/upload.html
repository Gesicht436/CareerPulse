<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Resume — CareerPulse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded flex items-center justify-center">
                <span class="text-white font-bold">C</span>
            </div>
            <a href="index.html" class="text-xl font-bold text-gray-900">CareerPulse</a>
        </div>

        <div class="hidden md:flex gap-6 text-sm font-medium">
            <a href="search.html" class="text-gray-500 hover:text-violet-600">Search</a>
            <a href="analyzer.html" class="text-gray-500 hover:text-violet-600">Analyzer</a>
            <a href="upload.html" class="text-violet-600 font-bold">Upload</a>
            <a href="dashboard.html" class="text-gray-500 hover:text-violet-600">Dashboard</a>
        </div>

        <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center border border-gray-200">
            <span class="text-gray-600 text-[10px] font-bold">JD</span>
        </div>
    </nav>

    <main class="grow max-w-4xl mx-auto px-6 py-12 w-full flex flex-col">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold mb-2">Analyze your resume</h1>
            <p class="text-gray-500">Upload your PDF to check security risks and job readiness.</p>
        </header>

        <div id="drop-zone" class="relative group grow flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-2xl bg-white p-12 hover:bg-violet-50/30 transition-colors cursor-pointer shadow-sm">
            <input type="file" id="file-input" class="hidden" accept="application/pdf">
            <div class="w-16 h-16 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            </div>
            <h3 class="text-lg font-bold">Drop resume here</h3>
            <p class="text-sm text-gray-500">or <span class="text-violet-600 font-bold">browse files</span></p>

            <div id="file-preview" class="hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-center p-8">
                <div class="w-12 h-16 bg-gray-100 rounded border border-gray-200 flex items-center justify-center mb-2 relative">
                    <span class="text-[8px] font-bold text-gray-400">PDF</span>
                    <button id="remove-file" class="absolute -top-2 -right-2 bg-red-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs">×</button>
                </div>
                <p id="file-name" class="text-sm font-bold truncate max-w-xs">filename.pdf</p>
            </div>
        </div>

        <div id="status-container" class="mt-6 hidden">
            <div class="bg-violet-600 rounded-xl p-4 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="animate-spin rounded-full h-4 w-4 border-2 border-white/30 border-t-white"></div>
                    <p class="text-sm font-bold">Analyzing...</p>
                </div>
                <span id="upload-progress" class="text-lg font-bold">0%</span>
            </div>
        </div>

        <div class="mt-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center">
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                </div>
                <p class="text-[10px] text-gray-400">Privacy Shield: PII redacted locally.</p>
            </div>
            <button id="upload-btn" class="w-full md:w-auto bg-gray-900 text-white font-bold px-10 py-3 rounded-full hover:bg-gray-800 disabled:opacity-50">Analyze Resume</button>
        </div>
    </main>

    <footer class="py-10 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 CareerPulse.
    </footer>

    <script src="js/upload.js" type="module"></script>
</body>

</html>
