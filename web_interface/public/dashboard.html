<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Analysis — CareerPulse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded flex items-center justify-center">
                <span class="text-white font-bold">C</span>
            </div>
            <a href="index.html" class="text-xl font-bold text-gray-900">CareerPulse</a>
        </div>

        <div class="hidden md:flex gap-6 text-sm font-medium">
            <a href="search.html" class="text-gray-500 hover:text-violet-600">Search</a>
            <a href="analyzer.html" class="text-gray-500 hover:text-violet-600">Analyzer</a>
            <a href="upload.html" class="text-gray-500 hover:text-violet-600">Upload</a>
            <a href="dashboard.html" class="text-violet-600 font-bold">Dashboard</a>
        </div>

        <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center border border-gray-200">
            <span class="text-gray-600 text-[10px] font-bold">JD</span>
        </div>
    </nav>

    <main class="grow max-w-6xl mx-auto px-6 py-12 w-full">
        <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-gray-900" id="job-title">Analysis Results</h1>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-sm text-gray-500">
                    <span id="company-name" class="font-semibold text-violet-600">Based on your profile</span>
                    <span class="flex items-center gap-1" id="job-location">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Loading...
                    </span>
                    <span class="flex items-center gap-1" id="salary-range">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        N/A
                    </span>
                    <span class="flex items-center gap-1" id="experience-level">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        Not specified
                    </span>
                </div>
            </div>
            <div class="flex items-center gap-4 bg-white p-2 pl-4 rounded-xl border border-gray-100 shadow-sm">
                <span class="text-xs font-bold text-gray-400 uppercase">Match Score</span>
                <div id="score-ring" class="w-12 h-12 rounded bg-violet-600 flex items-center justify-center text-white font-bold text-lg">0%</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <h2 class="text-lg font-bold mb-4">Justification</h2>
                    <div id="justification-list" class="space-y-3">
                        <div class="flex gap-3">
                            <div class="w-5 h-5 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mt-0.5">✓</div>
                            <p class="text-gray-600 text-sm italic">Analyzing...</p>
                        </div>
                    </div>
                </section>

                <div class="grid md:grid-cols-2 gap-8">
                    <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h3 class="text-xs font-bold text-teal-600 uppercase mb-4">Matched Skills</h3>
                        <div id="matched-skills" class="flex flex-wrap gap-2"></div>
                    </section>
                    <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h3 class="text-xs font-bold text-red-500 uppercase mb-4">Skill Gaps</h3>
                        <div id="missing-skills" class="flex flex-wrap gap-2"></div>
                    </section>
                </div>
            </div>

            <section class="bg-violet-600 rounded-2xl p-6 text-white h-fit">
                <h2 class="text-xl font-bold mb-6">4-Week Roadmap</h2>
                <div id="roadmap-container" class="space-y-8">
                    <div class="pl-4 border-l border-white/20 pb-2">
                        <h4 class="text-xs font-bold text-white/60 uppercase mb-1">Week 1</h4>
                        <p class="text-sm">Initializing...</p>
                    </div>
                </div>
                <button class="w-full bg-white text-violet-600 font-bold py-3 rounded-lg mt-8 hover:bg-gray-50">Export PDF</button>
            </section>
        </div>
    </main>

    <footer class="py-10 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 CareerPulse.
    </footer>

    <script src="js/dashboard.js" type="module"></script>
</body>

</html>
