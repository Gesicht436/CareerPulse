<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Jobs — CareerPulse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded flex items-center justify-center">
                <span class="text-white font-bold">C</span>
            </div>
            <a href="index.html" class="text-xl font-bold text-gray-900">CareerPulse</a>
        </div>

        <div class="hidden md:flex gap-6 text-sm font-medium">
            <a href="search.html" class="text-violet-600 font-bold">Search</a>
            <a href="analyzer.html" class="text-gray-500 hover:text-violet-600">Analyzer</a>
            <a href="upload.html" class="text-gray-500 hover:text-violet-600">Upload</a>
            <a href="dashboard.html" class="text-gray-500 hover:text-violet-600">Dashboard</a>
        </div>

        <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center border border-gray-200">
            <span class="text-gray-600 text-[10px] font-bold">JD</span>
        </div>
    </nav>

    <main class="grow max-w-6xl mx-auto px-6 py-12 w-full">
        <header class="mb-10">
            <h1 class="text-3xl font-bold mb-2">Find your next role</h1>
            <p class="text-gray-500">AI-curated job database with privacy-first matching.</p>
        </header>

        <div class="relative mb-10">
            <input type="text" placeholder="Search role, company, or keyword..."
                class="w-full px-6 py-4 rounded-xl bg-white border border-gray-200 shadow-sm focus:outline-none focus:border-violet-500 text-lg">
            <button class="absolute right-2 top-2 bg-violet-600 text-white font-bold px-6 py-2 rounded-lg hover:bg-violet-700">Search</button>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <div class="w-10 h-10 bg-gray-50 rounded flex items-center justify-center text-[10px] font-bold text-gray-400">LOGO</div>
                    <div class="px-2 py-1 bg-teal-50 text-teal-600 rounded text-[10px] font-bold uppercase">92% Match</div>
                </div>
                <h3 class="text-lg font-bold mb-1">Senior Engineer</h3>
                <p class="text-gray-500 text-sm mb-4">TechFlow • Remote</p>
                <div class="flex gap-2 mb-4">
                    <span class="px-2 py-1 bg-gray-50 text-gray-400 rounded text-[10px] font-bold">Python</span>
                    <span class="px-2 py-1 bg-gray-50 text-gray-400 rounded text-[10px] font-bold">AWS</span>
                </div>
                <div class="pt-4 border-t border-gray-50 flex justify-between items-center text-xs">
                    <span class="font-bold">$140k+</span>
                    <span class="text-gray-400">2d ago</span>
                </div>
            </div>

            <div class="border-2 border-dashed border-gray-100 rounded-2xl flex flex-col items-center justify-center p-6 text-center bg-gray-50/50">
                <p class="text-xs font-bold text-gray-300 uppercase tracking-widest">More coming soon</p>
            </div>
        </div>
    </main>

    <footer class="py-10 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 CareerPulse.
    </footer>

</body>

</html>
