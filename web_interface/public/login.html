<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — CareerPulse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <nav class="px-6 py-6 flex justify-center md:justify-start">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded flex items-center justify-center">
                <span class="text-white font-bold">C</span>
            </div>
            <a href="index.html" class="text-xl font-bold">CareerPulse</a>
        </div>
    </nav>

    <main class="grow flex items-center justify-center px-6">
        <div class="w-full max-w-sm">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold mb-1">Welcome</h1>
                    <p class="text-sm text-gray-500">Sign in to access your dashboard.</p>
                </div>

                <form class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Email</label>
                        <input type="email" placeholder="name@company.com" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-violet-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Password</label>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-violet-500 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-violet-600 text-white font-bold py-3 rounded-lg hover:bg-violet-700 transition-colors">Sign In</button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-50 text-center">
                    <p class="text-xs text-gray-500">
                        No account? <a href="#" class="text-violet-600 font-bold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-xs text-gray-400">
        © 2026 CareerPulse.
    </footer>

</body>

</html>
