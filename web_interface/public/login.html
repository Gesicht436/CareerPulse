<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — CareerPulse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#fafafa] text-slate-900 min-h-screen flex flex-col antialiased selection:bg-violet-100">

    <!-- Navbar (Simplified) -->
    <nav class="px-8 py-6 flex justify-center md:justify-start items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center shadow-lg shadow-violet-200">
                <span class="text-white font-bold text-lg">C</span>
            </div>
            <a href="index.html" class="text-xl font-bold tracking-tight text-slate-900">CareerPulse</a>
        </div>
    </nav>

    <!-- Login Form -->
    <main class="grow flex items-center justify-center px-6 pb-20">
        <div class="w-full max-w-md animate-fade-in-up">
            <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">Welcome back</h1>
                    <p class="text-slate-500">Enter your credentials to access your dashboard.</p>
                </div>

                <form class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                        <input type="email" id="email" placeholder="name@company.com"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500 transition-all placeholder:text-slate-400">
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                            <a href="#" class="text-sm font-medium text-violet-600 hover:text-violet-700">Forgot?</a>
                        </div>
                        <input type="password" id="password" placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500 transition-all placeholder:text-slate-400">
                    </div>

                    <button type="submit"
                        class="w-full bg-violet-600 text-white font-bold py-4 rounded-xl hover:bg-violet-700 transition-all shadow-lg shadow-violet-200 active:scale-[0.98]">
                        Sign In
                    </button>
                </form>

                <div class="mt-10 pt-8 border-t border-slate-50 text-center">
                    <p class="text-sm text-slate-500 font-medium">
                        Don't have an account?
                        <a href="#"
                            class="text-violet-600 hover:text-violet-700 font-bold ml-1 transition-colors">Create
                            account</a>
                    </p>
                </div>
            </div>

            <p class="text-center text-xs text-slate-400 mt-8 px-8 leading-relaxed">
                By continuing, you agree to CareerPulse's <a href="#" class="underline">Terms of Service</a> and <a
                    href="#" class="underline">Privacy Policy</a>.
            </p>
        </div>
    </main>

    <footer class="py-8 text-center text-xs text-slate-400">
        © 2026 CareerPulse. All rights reserved.
    </footer>

</body>

</html>
